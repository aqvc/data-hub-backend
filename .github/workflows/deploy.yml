name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: '908027420605'
  ECR_REPO: data-hub-backend
  EB_APP_NAME: data-hub-backend
  EB_ENV_NAME: data-hub-backend-production

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC auth to AWS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Option A (recommended): OIDC — set AWS_DEPLOY_ROLE_ARN in repo secrets
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Option B: static keys — comment the line above and uncomment these:
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
          echo "sha_short=${SHA_SHORT}"            >> "$GITHUB_OUTPUT"
          echo "ecr_uri=${ECR_URI}"                >> "$GITHUB_OUTPUT"
          echo "full_image=${ECR_URI}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "version_label=${EB_APP_NAME}-${SHA_SHORT}-${GITHUB_RUN_NUMBER}-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.vars.outputs.full_image }}
            ${{ steps.vars.outputs.ecr_uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Dockerrun.aws.json
        run: |
          cat > Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${{ steps.vars.outputs.ecr_uri }}:latest",
              "Update": "true"
            },
            "Ports": [
              { "ContainerPort": 3000, "HostPort": 80 }
            ],
            "Logging": "/app/log"
          }
          EOF

      - name: Package deployment bundle
        run: zip -j deploy-bundle.zip Dockerrun.aws.json

      - name: Upload bundle to S3 and deploy
        env:
          VERSION_LABEL: ${{ steps.vars.outputs.version_label }}
        run: |
          EB_S3_BUCKET="elasticbeanstalk-us-east-1-908027420605"
          S3_KEY="${EB_APP_NAME}/${VERSION_LABEL}.zip"

          aws s3 cp deploy-bundle.zip "s3://${EB_S3_BUCKET}/${S3_KEY}" \
            --region "$AWS_REGION"

          aws elasticbeanstalk create-application-version \
            --region "$AWS_REGION" \
            --application-name "$EB_APP_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle "S3Bucket=${EB_S3_BUCKET},S3Key=${S3_KEY}" \
            --no-auto-create-application

          aws elasticbeanstalk update-environment \
            --region "$AWS_REGION" \
            --application-name "$EB_APP_NAME" \
            --environment-name "$EB_ENV_NAME" \
            --version-label "$VERSION_LABEL"

      - name: Wait for deployment to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
            --region "$AWS_REGION" \
            --application-name "$EB_APP_NAME" \
            --environment-names "$EB_ENV_NAME" \
            --version-label "${{ steps.vars.outputs.version_label }}"

      - name: Deployment summary
        run: |
          echo "### Deployed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ steps.vars.outputs.version_label }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.vars.outputs.full_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`${{ env.EB_ENV_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
